kind = "web"
previewPath = "/"
title = "Stadium Area Constituency Portal"
version = "1.0.0"
id = "artifacts/stadium-area"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24577

[services.development]
run = "pnpm --filter @workspace/stadium-area run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/stadium-area", "run", "build" ]
publicDir = "artifacts/stadium-area/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24577"
BASE_PATH = "/"
